<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyüp Karakaya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #141414;
            --bg-card: #1e1e1e;
            --text-main: #f8fafc;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            
            --yt-color: #ff0033;
            --ig-color: #d946ef;
            --tt-color: #ff0050;
            --fb-color: #1877f2;
            --in-color: #0a66c2;
            --xb-color: #9b1c73;
            --hz-color: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- 1. YENİ PROFİL DÜZENİ --- */
        .profile-row {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .avatar-box {
            width: 65px; height: 65px; flex-shrink: 0;
        }

        .avatar {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 50%; 
            border: 2px solid var(--border-color); 
        }

        .profile-info {
            display: flex; flex-direction: column; justify-content: center;
            flex-grow: 1; min-width: 0;
        }

        .p-top-line {
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .p-name { font-size: 1.15rem; font-weight: 800; color: var(--text-main); }
        .p-divider-text { color: var(--border-color); font-weight: 300; }
        .p-title { font-size: 0.85rem; color: #f59e0b; font-weight: 600; }

        .p-divider-line {
            width: 100%; height: 1px; background: var(--border-color); margin: 6px 0;
        }

        .p-bio {
            font-size: 0.8rem; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- 2. PLATFORM SEKMELERİ --- */
        .tabs-row {
            display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; 
            background: rgba(255,255,255,0.02); padding: 8px 12px;
            border-radius: 20px; border: 1px solid var(--border-color);
            flex-shrink: 0; width: 100%;
        }

        .tab-btn {
            background: transparent; color: var(--text-muted); border: none;
            padding: 8px 18px; border-radius: 30px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            line-height: 1; white-space: nowrap;
        }

        .tab-btn i {
            font-size: 0.95rem; display: flex; align-items: center; justify-content: center; width: 18px;
        }
        
        .tab-btn span {
            display: inline-flex; align-items: center; margin-top: 1px;
        }

        .tab-btn.active { color: #fff; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }

        /* --- 3. DİNAMİK İÇERİK ALANI --- */
        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 0; 
            animation: fadeIn 0.3s ease;
        }

        .platform-head {
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .platform-head h2 { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .btn-profile-link {
            background: transparent; color: var(--text-main); border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
            text-decoration: none; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-profile-link:hover { 
            background: var(--current-platform-color, rgba(255,255,255,0.05)); 
            border-color: var(--current-platform-color, var(--border-color));
            color: #fff;
        }

        /* Üst İstatistikler */
        .top-stats {
            display: grid; gap: 15px; flex-shrink: 0;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 140px; 
            transition: all 0.3s ease; 
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px var(--current-platform-color); 
        }
        .stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .stat-val { font-size: 2.2rem; font-weight: 800; line-height: 1.1; display: block; margin-bottom: 4px; }
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

        /* Alt Analitik */
        .bottom-analytics {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0;
        }
        .analytic-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; display: flex; flex-direction: column; overflow: hidden;
            min-height: 0;
        }
        .analytic-box h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        /* Barlar */
        .bars-container { display: flex; flex-direction: column; justify-content: flex-start; gap: 8px; overflow: hidden; padding-right: 5px; flex-grow: 1; min-height: 0; padding-top: 5px; }
        .bar-row { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; font-weight: 500; }
        .bar-label { width: 80px; white-space: nowrap; }
        .bar-track { flex-grow: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease-out; }
        .bar-val { width: 45px; text-align: right; font-weight: 700; }
        .bar-divider { height: 1px; background: var(--border-color); margin: 5px 0; flex-shrink: 0; }

        /* Listeler */
        .list-container { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 5px; flex-grow: 1; min-height: 0; }
        .list-row {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
        }
        .list-rank {
            width: 22px; height: 22px; border-radius: 4px; color: #fff;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 0.7rem; font-weight: 800; margin-right: 10px;
        }

        /* --- HİZMETLER VE FİYAT --- */
        .services-layout { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; gap: 15px; height: 100%; flex-grow: 1; padding-top: 5px; }
        
        .services-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; flex-shrink: 0;
        }
        .service-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 25px 20px; display: flex; flex-direction: column;
            align-items: flex-start; text-align: left; justify-content: flex-start; 
            transition: all 0.3s ease; overflow-y: auto; height: 100%;
        }
        .service-card:hover { 
            border-color: var(--hz-color); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px -5px var(--hz-color); 
        }
        
        .service-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; line-height: 1.4; color: var(--text-main); min-height: 50px; display: flex; align-items: flex-start; }
        .service-card .s-time { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: center; justify-content: flex-start; gap: 6px; }
        .service-card .s-price { font-size: 2rem; font-weight: 900; color: var(--hz-color); margin-bottom: 15px; letter-spacing: -0.5px; min-height: 38px; display: flex; align-items: center; }
        .service-card .s-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }

        /* İletişim & Kopyala Kutusu */
        .contact-action-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; width: 100%;
        }
        .contact-info h4 { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .contact-info p { font-size: 0.8rem; color: var(--text-muted); }
        
        .copy-wrapper {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.03); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--border-color);
        }
        .copy-email-text { 
            font-size: 0.9rem; font-weight: 600; color: var(--text-main); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; /* Çok uzunsa 3 nokta koyar */
        }
        .btn-copy-action {
            background: #ff0033; 
            color: #fff; border: none; padding: 8px 16px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 800; cursor: pointer; transition: 0.2s; 
            white-space: nowrap; flex-shrink: 0; min-width: 110px; text-align: center; /* Sıkışmayı ve taşmayı önler */
        }

        /* Footer */
        .copyright-footer {
            text-align: left; font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0;
            padding-left: 10px; font-weight: 500;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar Özel Tasarımı */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }


        /* =========================================================
           RESPONSIVE (MOBİL VE TABLET UYUMU) EKLENTİSİ
           ========================================================= */
        
        /* TABLET GÖRÜNÜMÜ (1024px ve altı) */
        @media (max-width: 1024px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); } 
        }

        /* MOBİL VE KÜÇÜK TABLET GÖRÜNÜMÜ (850px ve altı) */
        @media (max-width: 850px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 10px; }
            .dashboard { height: auto; }
            .content-area { height: auto; overflow: visible; }
            
            .profile-row { flex-direction: column; text-align: center; gap: 15px; padding: 20px 15px; }
            .p-top-line { flex-wrap: wrap; justify-content: center; white-space: normal; line-height: 1.4; }
            .p-divider-text { display: none; } 
            .p-bio { white-space: normal; line-height: 1.4; text-align: center; }
            
            .contact-action-box { flex-direction: column; text-align: center; gap: 15px; }
            .copy-wrapper { width: 100%; justify-content: space-between; }
            
            .bottom-analytics { grid-template-columns: 1fr; display: flex; flex-direction: column; height: auto !important; }
            .analytic-box { min-height: auto; overflow: visible; }
            .bars-container, .list-container, .geo-split { overflow: visible; height: auto; max-height: none; }
            .service-card { height: auto !important; overflow: visible; } 
        }

        /* TAM MOBİL TELEFON GÖRÜNÜMÜ (600px ve altı) */
        @media (max-width: 600px) {
            .top-stats { grid-template-columns: 1fr !important; } 
            .services-grid { grid-template-columns: 1fr; }
            
            .platform-head { flex-direction: column; gap: 15px; align-items: center; text-align: center; margin-bottom: 10px; }
            .platform-head h2 { justify-content: center; text-align: center; }
            .btn-profile-link { width: 100%; justify-content: center; padding: 12px; font-size: 0.85rem; }
            
            .tabs-row { border-radius: 12px; gap: 8px; }
            .tab-btn { flex-grow: 1; padding: 10px; font-size: 0.75rem; border-radius: 8px; }

            /* Mobilde taşmayı önlemek için e-posta ve butonu alt alta diziyoruz */
            .copy-wrapper { flex-direction: column; border-radius: 15px; padding: 15px; gap: 12px; }
            .copy-email-text { font-size: 1rem; }
            .btn-copy-action { width: 100%; padding: 12px; font-size: 0.85rem; }
        }
    </style>
</head>

        };

        const tabsContainer = document.getElementById('tabs-container');
        const dynamicContent = document.getElementById('dynamic-content');
        let currentIntervals = [];

        function initTabs() {
            Object.values(platformsData).forEach((p, idx) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${idx === 0 ? 'active' : ''}`;
                
                if(p.id === 'hizmetler') {
                    btn.innerHTML = `<i class="${p.icon}" style="color:${p.color}"></i> <span style="color:${p.color}">${p.name}</span>`;
                } else {
                    btn.innerHTML = `<i class="${p.icon}"></i> <span>${p.name}</span>`;
                }
                btn.onclick = () => selectPlatform(p.id, btn);
                tabsContainer.appendChild(btn);
            });
            selectPlatform('youtube', tabsContainer.firstChild);
        }

        function selectPlatform(pid, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.style.background = 'transparent';
                if(b.innerText.includes('Hizmetler')) {
                    b.querySelector('span').style.color = platformsData['hizmetler'].color;
                    b.querySelector('i').style.color = platformsData['hizmetler'].color;
                } else {
                    b.style.color = 'var(--text-muted)';
                }
            });

            if(btn) {
                if(pid === 'hizmetler') {
                    btn.style.background = platformsData['hizmetler'].color;
                    btn.querySelector('span').style.color = '#fff';
                    btn.querySelector('i').style.color = '#fff';
                } else {
                    btn.style.background = platformsData[pid].color;
                    btn.style.color = '#fff';
                }
            }

            const data = platformsData[pid];
            document.getElementById('main-avatar').style.borderColor = data.color;
            document.documentElement.style.setProperty('--current-platform-color', data.color);

            // HİZMETLER ALANI
            if(pid === 'hizmetler') {
                dynamicContent.innerHTML = `
                    <div class="services-layout">
                        <div class="platform-head" style="justify-content: center; width: 100%; margin-bottom: 5px;">
                            <h2 style="color: ${data.color};"><i class="${data.icon}"></i> Standart Hizmetler ve Fiyatlandırma</h2>
                        </div>
                        <div class="services-grid">
                            ${data.pkgs.map(p => `
                                <div class="service-card" style="border-top: 3px solid ${data.color};">
                                    <h3>${p.t}</h3>
                                    <div class="s-time"><i class="far fa-clock"></i> ${p.time}</div>
                                    <div class="s-price">${p.p}</div>
                                    <div class="s-desc">${p.d}</div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="contact-action-box">
                            <div class="contact-info">
                                <h4><i class="fas fa-paper-plane" style="color:${data.color}"></i> Projeniz İçin İletişime Geçin</h4>
                                <p>Sponsorluk, ürün incelemesi veya özel projeler için detayları benimle paylaşabilirsiniz.</p>
                            </div>
                            <div class="copy-wrapper">
                                <span class="copy-email-text">karakayaeyp7@gmail.com</span>
                                <button class="btn-copy-action" onclick="copyMyEmail(this)">Kopyalayın</button>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            // İSTATİSTİK ALANI
            const gridCols = data.stats.length === 3 ? 'repeat(3, 1fr)' : '1fr 1fr';
            
            let html = `
                <div class="platform-head">
                    <h2 style="color: ${data.color};"><i class="${data.icon}"></i> ${data.name} İstatistikleri</h2>
                    <a href="${data.url}" target="_blank" class="btn-profile-link">
                        ${data.name} Profilime Git <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
                
                <div class="top-stats" style="grid-template-columns: ${gridCols};">
                    ${data.stats.map(s => `
                        <div class="stat-card" style="border-top-color: ${data.color}">
                            <i class="${s.i} stat-icon" style="color: ${data.color}"></i>
                            <span class="stat-val counter" data-target="${s.v}">0</span>
                            <span class="stat-lbl">${s.l}</span>
                        </div>
                    `).join('')}
                </div>
            `;

            if(data.demo) {
                html += `
                <div class="bottom-analytics">
                    <div class="analytic-box">
                        <h3><i class="fas fa-chart-pie" style="color:${data.color}"></i> Yaş ve Cinsiyet</h3>
                        <div class="bars-container">
                            ${data.demo.gender.map(g => `
                                <div class="bar-row">
                                    <span class="bar-label">${g.l}</span>
                                    <div class="bar-track"><div class="bar-fill" style="width:${g.p}%; background:${data.color}"></div></div>
                                    <span class="bar-val">%${g.p}</span>
                                </div>
                            `).join('')}
                            <div class="bar-divider"></div>
                            ${data.demo.age.map(a => `
                                <div class="bar-row">
                                    <span class="bar-label">${a.l}</span>
                                    <div class="bar-track"><div class="bar-fill" style="width:${a.p}%; background:${data.color}"></div></div>
                                    <span class="bar-val">%${a.p}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <div class="analytic-box" style="padding: 15px 20px;">
                        <div style="display: flex; flex-direction: column; gap: 15px; flex-grow: 1; min-height: 0;" class="geo-split">
                            ${data.demo.geoLists.map((gList, index) => `
                                <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;" class="geo-section">
                                    <div style="font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;"><i class="${gList.icon}"></i> ${gList.title}</div>
                                    <div class="list-container">
                                        ${gList.items.map((loc, i) => `
                                            <div class="list-row">
                                                <span><span class="list-rank" style="background:${data.color}">${i+1}</span> ${loc.n}</span>
                                                <span style="color:${data.color}; font-weight:800;">${loc.p}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                                ${index !== data.demo.geoLists.length - 1 ? '<div class="bar-divider"></div>' : ''}
                            `).join('')}
                        </div>
                    </div>
                </div>
                `;
            }

            dynamicContent.innerHTML = html;
            animateCounters(data.stats);
        }

        function animateCounters(statsData) {
            currentIntervals.forEach(clearInterval);
            currentIntervals = [];
            const counters = document.querySelectorAll('.counter');
            
            counters.forEach((c, index) => {
                const target = parseFloat(c.getAttribute('data-target'));
                const suffix = statsData[index].s;
                const dur = 1000; const steps = 30; const inc = target / steps;
                let cur = 0;
                
                const timer = setInterval(() => {
                    cur += inc;
                    if(cur >= target) { 
                        c.innerText = (target % 1 !== 0) ? target.toString() + suffix : target.toLocaleString('tr-TR') + suffix; 
                        clearInterval(timer); 
                    } else { 
                        c.innerText = (target % 1 !== 0) ? cur.toFixed(1) : Math.ceil(cur).toLocaleString('tr-TR'); 
                    }
                }, dur/steps);
                currentIntervals.push(timer);
            });
        }

        // --- GİZLİ KOPYALAMA FONKSİYONU ---
        function copyMyEmail(btn) {
            const email = "karakayaeyp7@gmail.com";
            const textArea = document.createElement("textarea");
            textArea.value = email;
            textArea.style.position = "absolute";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            textArea.setAttribute("readonly", ""); 
            
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                btn.style.background = "#10b981"; // Başarılı olunca yeşil renk
                btn.innerText = "Kopyalandı ✓";
                
                setTimeout(() => {
                    btn.style.background = "#ff0033"; // Süre bitince eski kırmızı renge dön
                    btn.innerText = "Kopyalayın";
                }, 2000);
            } catch (err) {
                console.error('Kopyalama hatası:', err);
            }
            document.body.removeChild(textArea);
        }

        initTabs();

        // Güvenlik
        document.onkeydown = (e) => { 
            if(e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83)) return false; 
            if(e.keyCode === 123) return false;
        };
    </script>
</body>
</html>
