<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyüp Karakaya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Koyu Tema (Varsayılan) */
            --bg-main: #141414;
            --bg-card: #1e1e1e;
            --text-main: #f8fafc;
            --text-muted: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.08);
            --bg-soft: rgba(255, 255, 255, 0.02);
            --bg-hover: rgba(255, 255, 255, 0.05);
            
            /* Marka Renkleri */
            --yt-color: #ff0033;
            --ig-color: #d946ef;
            --tt-color: #ff0050;
            --fb-color: #1877f2;
            --in-color: #0a66c2;
            --xb-color: #9b1c73;
            --hz-color: #f59e0b;
        }

        /* Açık Tema (Göz yormayan soft renkler) */
        body.light-theme {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.08);
            --bg-soft: rgba(0, 0, 0, 0.03);
            --bg-hover: rgba(0, 0, 0, 0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-user-select: none; user-select: none; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .dashboard {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- 1. YENİ PROFİL DÜZENİ --- */
        .profile-row {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .avatar-box {
            width: 65px; height: 65px; flex-shrink: 0;
        }

        .avatar {
            width: 100%; height: 100%; object-fit: cover;
            border-radius: 50%; 
            border: 2px solid var(--border-color); 
        }

        .profile-info {
            display: flex; flex-direction: column; justify-content: center;
            flex-grow: 1; min-width: 0;
        }

        .p-top-line {
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .p-name { font-size: 1.15rem; font-weight: 800; color: var(--text-main); }
        .p-divider-text { color: var(--border-color); font-weight: 300; }
        .p-title { font-size: 0.85rem; color: #f59e0b; font-weight: 600; }

        .p-divider-line {
            width: 100%; height: 1px; background: var(--border-color); margin: 6px 0;
        }

        .p-bio {
            font-size: 0.8rem; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* YENİ SWITCH (KAYDIRMALI) TASARIMI VE DİK ÇİZGİ */
        .profile-divider-vertical {
            width: 1px;
            height: 60px;
            background: var(--border-color);
            margin: 0 10px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .action-toggles {
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            flex-shrink: 0;
        }
        
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 5px 12px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            background: var(--bg-soft);
            transition: all 0.3s ease;
            width: 110px; /* Hizalamayı sağlayan sabit genişlik */
            cursor: pointer;
        }
        
        .toggle-container:hover {
            border-color: var(--hz-color);
            background: var(--bg-hover);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.1);
        }

        .t-icon-left, .t-icon-right {
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--text-muted); 
            transition: 0.3s;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 16px;
        }

        /* Aktif duruma göre renk değiştirme kuralları */
        .theme-is-dark .theme-l { color: var(--text-main); }
        .theme-is-light .theme-r { color: var(--hz-color); }
        .lang-is-tr .lang-l { color: var(--text-main); }
        .lang-is-en .lang-r { color: var(--hz-color); }

        .switch {
            position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; margin: 0;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.08); border-radius: 20px; transition: .3s;
        }
        body.light-theme .slider { background-color: rgba(0,0,0,0.08); }
        
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px;
            background-color: var(--text-muted); border-radius: 50%; transition: .3s;
        }
        input:checked + .slider { background-color: rgba(245, 158, 11, 0.2); }
        input:checked + .slider:before { transform: translateX(16px); background-color: var(--hz-color); }
        
        /* Dark modda sol aktifken beyaz nokta şıklığı */
        .theme-is-dark #theme-switch + .slider:before,
        .lang-is-tr #lang-switch + .slider:before { background-color: var(--text-main); }

        /* --- 2. PLATFORM SEKMELERİ --- */
        .tabs-row {
            display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; 
            background: var(--bg-soft); padding: 8px 12px;
            border-radius: 20px; border: 1px solid var(--border-color);
            flex-shrink: 0; width: 100%; transition: all 0.3s ease;
        }

        .tab-btn {
            background: transparent; color: var(--text-muted); border: none;
            padding: 8px 18px; border-radius: 30px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            line-height: 1; white-space: nowrap;
        }

        .tab-btn i { font-size: 0.95rem; display: flex; align-items: center; justify-content: center; width: 18px; }
        .tab-btn span { display: inline-flex; align-items: center; margin-top: 1px; }
        .tab-btn.active { color: #fff; }
        .tab-btn:hover { color: #fff; background: var(--bg-hover); }
        body.light-theme .tab-btn:hover { color: var(--text-main); }
        body.light-theme .tab-btn.active { color: #fff; }

        /* --- 3. DİNAMİK İÇERİK ALANI --- */
        .content-area {
            flex-grow: 1; display: flex; flex-direction: column; gap: 15px; min-height: 0; animation: fadeIn 0.3s ease;
        }

        .platform-head { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .platform-head h2 { font-size: 1.3rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .btn-profile-link {
            background: transparent; color: var(--text-main); border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 600;
            text-decoration: none; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-profile-link:hover { 
            background: var(--current-platform-color, var(--bg-hover)); 
            border-color: var(--current-platform-color, var(--border-color)); color: #fff;
        }

        /* Üst İstatistikler */
        .top-stats { display: grid; gap: 15px; flex-shrink: 0; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; text-align: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 140px; transition: all 0.3s ease; 
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px -5px var(--current-platform-color); }
        .stat-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .stat-val { font-size: 2.2rem; font-weight: 800; line-height: 1.1; display: block; margin-bottom: 4px; }
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

        /* Alt Analitik */
        .bottom-analytics { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1; min-height: 0; }
        .analytic-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; min-height: 0; transition: all 0.3s ease;
        }
        .analytic-box h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        /* Barlar */
        .bars-container { display: flex; flex-direction: column; justify-content: flex-start; gap: 8px; overflow: hidden; padding-right: 5px; flex-grow: 1; min-height: 0; padding-top: 5px; }
        .bar-row { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; font-weight: 500; }
        .bar-label { width: 80px; white-space: nowrap; }
        .bar-track { flex-grow: 1; height: 6px; background: var(--bg-hover); border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 1s ease-out; }
        .bar-val { width: 45px; text-align: right; font-weight: 700; }
        .bar-divider { height: 1px; background: var(--border-color); margin: 5px 0; flex-shrink: 0; }

        /* Listeler */
        .list-container { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; padding-right: 5px; flex-grow: 1; min-height: 0; }
        .list-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-soft); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
        }
        .list-rank {
            width: 22px; height: 22px; border-radius: 4px; color: #fff;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 0.7rem; font-weight: 800; margin-right: 10px;
        }

        /* --- HİZMETLER VE FİYAT --- */
        .services-layout { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; gap: 15px; height: 100%; flex-grow: 1; padding-top: 5px; }
        .services-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; flex-shrink: 0; }
        .service-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 25px 20px; display: flex; flex-direction: column;
            align-items: flex-start; text-align: left; justify-content: flex-start; 
            transition: all 0.3s ease; overflow-y: auto; height: 100%;
        }
        .service-card:hover { border-color: var(--hz-color); transform: translateY(-5px); box-shadow: 0 10px 25px -5px var(--hz-color); }
        .service-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; line-height: 1.4; color: var(--text-main); min-height: 50px; display: flex; align-items: flex-start; }
        .service-card .s-time { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 20px; display: flex; align-items: center; justify-content: flex-start; gap: 6px; }
        .service-card .s-price { font-size: 2rem; font-weight: 900; color: var(--hz-color); margin-bottom: 15px; letter-spacing: -0.5px; min-height: 38px; display: flex; align-items: center; }
        .service-card .s-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }

        /* İletişim & Kopyala Kutusu */
        .contact-action-box {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0; width: 100%; transition: all 0.3s ease;
        }
        .contact-info h4 { font-size: 1.1rem; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
        .contact-info p { font-size: 0.8rem; color: var(--text-muted); }
        .copy-wrapper { display: flex; align-items: center; gap: 10px; background: var(--bg-soft); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--border-color); }
        .copy-email-text { font-size: 0.9rem; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-copy-action {
            background: #ff0033; color: #fff; border: none; padding: 8px 16px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 800; cursor: pointer; transition: 0.2s; 
            white-space: nowrap; flex-shrink: 0; min-width: 110px; text-align: center;
        }

        /* Footer */
        .copyright-footer { text-align: left; font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; padding-left: 10px; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 10px; }

        /* RESPONSIVE (MOBİL VE TABLET UYUMU) */
        @media (max-width: 1024px) { .services-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 850px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; overflow-x: hidden; padding: 10px; }
            .dashboard { height: auto; }
            .content-area { height: auto; overflow: visible; }
            .profile-row { flex-direction: column; text-align: center; gap: 15px; padding: 20px 15px; position: relative; }
            .p-top-line { flex-wrap: wrap; justify-content: center; white-space: normal; line-height: 1.4; }
            .p-divider-text { display: none; } 
            .p-bio { white-space: normal; line-height: 1.4; text-align: center; }
            
            /* Mobilde düzenin bozulmaması için dikey çizgiyi gizler ve butonları yatay hizalar */
            .profile-divider-vertical { display: none; }
            .action-toggles { 
                flex-direction: row; 
                justify-content: center; 
                width: 100%; 
                margin-top: 5px; 
            }
            
            .contact-action-box { flex-direction: column; text-align: center; gap: 15px; }
            .copy-wrapper { width: 100%; justify-content: space-between; }
            .bottom-analytics { grid-template-columns: 1fr; display: flex; flex-direction: column; height: auto !important; }
            .analytic-box { min-height: auto; overflow: visible; }
            .bars-container, .list-container, .geo-split { overflow: visible; height: auto; max-height: none; }
            .service-card { height: auto !important; overflow: visible; } 
        }
        @media (max-width: 600px) {
            .top-stats { grid-template-columns: 1fr !important; } 
            .services-grid { grid-template-columns: 1fr; }
            .platform-head { flex-direction: column; gap: 15px; align-items: center; text-align: center; margin-bottom: 10px; }
            .platform-head h2 { justify-content: center; text-align: center; }
            .btn-profile-link { width: 100%; justify-content: center; padding: 12px; font-size: 0.85rem; }
            .tabs-row { border-radius: 12px; gap: 8px; }
            .tab-btn { flex-grow: 1; padding: 10px; font-size: 0.75rem; border-radius: 8px; }
            .copy-wrapper { flex-direction: column; border-radius: 15px; padding: 15px; gap: 12px; }
            .copy-email-text { font-size: 1rem; }
            .btn-copy-action { width: 100%; padding: 12px; font-size: 0.85rem; }
        }
    </style>
</head>

        function toggleTheme() {
            const body = document.body;
            const isLight = document.getElementById('theme-switch').checked;
            const rowTheme = document.getElementById('row-theme');

            if (isLight) {
                body.classList.add('light-theme');
                rowTheme.classList.remove('theme-is-dark');
                rowTheme.classList.add('theme-is-light');
            } else {
                body.classList.remove('light-theme');
                rowTheme.classList.add('theme-is-dark');
                rowTheme.classList.remove('theme-is-light');
            }
        }

        function toggleLang() {
            const isEn = document.getElementById('lang-switch').checked;
            const rowLang = document.getElementById('row-lang');

            if (isEn) {
                currentLang = 'en';
                rowLang.classList.remove('lang-is-tr');
                rowLang.classList.add('lang-is-en');
            } else {
                currentLang = 'tr';
                rowLang.classList.add('lang-is-tr');
                rowLang.classList.remove('lang-is-en');
            }
            updateStaticTexts();
            initTabs(); 
        }

        function updateStaticTexts() {
            const d = dict[currentLang];
            document.getElementById('t-prof-title').innerText = d.profTitle;
            document.getElementById('t-prof-bio').innerHTML = d.profBio;
            document.getElementById('t-footer').innerHTML = `<i class="fas fa-copyright"></i> ${d.footer}`;
        }

        function initTabs() {
            tabsContainer.innerHTML = ''; 
            const pData = getPlatformsData();
            
            Object.values(pData).forEach((p, idx) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${p.id === currentTabId ? 'active' : ''}`;
                
                if(p.id === 'hizmetler') {
                    btn.innerHTML = `<i class="${p.icon}" style="color:${p.color}"></i> <span style="color:${p.color}">${p.name}</span>`;
                } else {
                    btn.innerHTML = `<i class="${p.icon}"></i> <span>${p.name}</span>`;
                }
                btn.onclick = () => selectPlatform(p.id, btn);
                tabsContainer.appendChild(btn);
            });
            const activeBtn = Array.from(tabsContainer.children).find(b => b.className.includes('active')) || tabsContainer.firstChild;
            selectPlatform(currentTabId, activeBtn);
        }

        function selectPlatform(pid, btn) {
            currentTabId = pid;
            const pData = getPlatformsData();
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.style.background = 'transparent';
                if(b.innerText.includes(dict[currentLang].hizmetTab)) {
                    b.querySelector('span').style.color = pData['hizmetler'].color;
                    b.querySelector('i').style.color = pData['hizmetler'].color;
                } else {
                    b.style.color = 'var(--text-muted)';
                }
            });

            if(btn) {
                btn.classList.add('active');
                if(pid === 'hizmetler') {
                    btn.style.background = pData['hizmetler'].color;
                    btn.querySelector('span').style.color = '#fff';
                    btn.querySelector('i').style.color = '#fff';
                } else {
                    btn.style.background = pData[pid].color;
                    btn.style.color = '#fff';
                }
            }

            const data = pData[pid];
            document.getElementById('main-avatar').style.borderColor = data.color;
            document.documentElement.style.setProperty('--current-platform-color', data.color);

            const d = dict[currentLang];

            // HİZMETLER ALANI

                dynamicContent.innerHTML = `
                    <div class="services-layout">
                        <div class="platform-head" style="justify-content: center; width: 100%; margin-bottom: 5px;">

                                    <div class="s-price">${p.p}</div>
                                    <div class="s-desc">${p.d}</div>

                    <h2 style="color: ${data.color};"><i class="${data.icon}"></i> ${data.name} ${d.statsTitle}</h2>

                    </div>

            dynamicContent.innerHTML = html;
            animateCounters(data.stats);
        }

        function animateCounters(statsData) {
            currentIntervals.forEach(clearInterval);
            currentIntervals = [];
            const counters = document.querySelectorAll('.counter');
            
            counters.forEach((c, index) => {
                const target = parseFloat(c.getAttribute('data-target'));
                const suffix = statsData[index].s;
                const dur = 1000; const steps = 30; const inc = target / steps;
                let cur = 0;
                
                const timer = setInterval(() => {
                    cur += inc;
                    if(cur >= target) { 
                        c.innerText = (target % 1 !== 0) ? target.toString() + suffix : target.toLocaleString('tr-TR') + suffix; 
                        clearInterval(timer); 
                    } else { 
                        c.innerText = (target % 1 !== 0) ? cur.toFixed(1) : Math.ceil(cur).toLocaleString('tr-TR'); 
                    }
                }, dur/steps);
                currentIntervals.push(timer);
            });
        }

        function copyMyEmail(btn) {
            const email = "karakayaeyp7@gmail.com";
            const textArea = document.createElement("textarea");
            textArea.value = email;
            textArea.style.position = "absolute";
            textArea.style.left = "-9999px";
            textArea.style.top = "0";
            textArea.setAttribute("readonly", ""); 
            
            document.body.appendChild(textArea);
            textArea.select();
            const d = dict[currentLang];
            
            try {
                document.execCommand('copy');
                btn.style.background = "#10b981"; 
                btn.innerText = d.copiedBtn;
                
                setTimeout(() => {
                    btn.style.background = "#ff0033"; 
                    btn.innerText = d.copyBtn;
                }, 2000);
            } catch (err) {
                console.error('Kopyalama hatası:', err);
            }
            document.body.removeChild(textArea);
        }

        updateStaticTexts();
        initTabs();

        // Güvenlik
        document.onkeydown = (e) => { 
            if(e.ctrlKey && (e.keyCode === 67 || e.keyCode === 85 || e.keyCode === 83)) return false; 
            if(e.keyCode === 123) return false;
        };
